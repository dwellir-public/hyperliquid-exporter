name: CI Tests

on:
  pull_request:
    branches:
      - '**'
  push:
    branches:
      - main

env:
  GO_VERSION: 1.26.1
  GOLANGCI_LINT_VERSION: v2.11.3

jobs:
  golangci:
    name: Golang CI lint
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          args: --build-tags="heavy"

  unit-tests-heavy:
    name: Unit tests (heavy)
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - run: go mod download
      - run: go test -mod=readonly ./... -count=1 -shuffle=on -tags=heavy -race -v

  unit-tests-flaky:
    name: Unit tests (flaky)
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - run: go mod download
      - run: go test -mod=readonly ./... -count=16 -shuffle=on

  summary:
    name: CI Summary
    runs-on: blacksmith-2vcpu-ubuntu-2404
    needs: [golangci, unit-tests-heavy, unit-tests-flaky]
    if: always() # Always run, even if earlier jobs fail
    steps:
      - name: Write CI summary
        run: |
          {
            echo "## 🧪 CI Test Summary"
            echo ""
            echo "- **Lint:** ${{ needs.golangci.result }}"
            echo "- **Unit (heavy):** ${{ needs.unit-tests-heavy.result }}"
            echo "- **Unit (flaky):** ${{ needs.unit-tests-flaky.result }}"
            echo ""
            echo "### Commit"
            echo "[${{ github.sha }}](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})"
            echo ""
            echo "Triggered by: @${{ github.actor }}"
            echo "Event: \`${{ github.event_name }}\`"
            echo ""
            echo "[View workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
          } >> "$GITHUB_STEP_SUMMARY"
